name: Sandbox Check
# Runs on every PR — not just PRs touching sandbox/** — because the sandbox fixture engine is the CI guard
# for the generic engine extension points (KNNEngineDefinition registration, JNIService dispatch,
# query-parameter deferral), and a core refactor can break that seam without touching sandbox files.
on:
  push:
    branches:
      - "*"
      - "feature/**"
  pull_request:
    branches:
      - "*"
      - "feature/**"

jobs:
  sandbox-check:
    strategy:
      matrix:
        java: [21, 25]
    name: Build and check the sandbox with -Pknn.sandbox.enabled=true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout k-NN
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Run sandbox checks
        run: ./gradlew -p sandbox check -Pknn.sandbox.enabled=true
